    <style>
        /* --- 1. CORE VARIABLES & ANIMATIONS --- */
        :root {
            --bg-dark: #0a0a0a;
            --card-glass: rgba(30, 41, 59, 0.7);
            --odoo-purple: #714B67;
            --odoo-green: #00E88F;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        @keyframes gradient-move {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        body {
            margin: 0;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: gradient-move 15s ease infinite;
            color: var(--text-main);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* --- GRAINY NOISE TEXTURE --- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("https://grainy-gradients.vercel.app/noise.svg");
            opacity: 0.04;
            z-index: -1;
            pointer-events: none;
            filter: contrast(150%) brightness(100%);
        }

        /* --- CUSTOM SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--odoo-purple);
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
            pointer-events: none;
        }

        /* --- 2. TERMINAL --- */
        .terminal-container {
            width: 90%;
            max-width: 1000px;
            margin-top: 40px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            overflow: hidden;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .terminal-header {
            background: #1e293b;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .red {
            background: #ff5f56;
        }

        .yellow {
            background: #ffbd2e;
        }

        .green {
            background: #27c93f;
        }

        .tab {
            margin-left: 20px;
            background: #0f172a;
            padding: 5px 15px;
            border-radius: 5px 5px 0 0;
            font-size: 0.8rem;
            color: var(--odoo-green);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .terminal-body {
            padding: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            cursor: text;
        }

        .command-line {
            display: flex;
            flex-wrap: wrap;
        }

        .prompt {
            color: var(--odoo-green);
            margin-right: 8px;
            text-shadow: 0 0 5px rgba(0, 232, 143, 0.3);
        }

        .input-area {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            outline: none;
            flex: 1;
            min-width: 50px;
        }

        .output {
            margin-bottom: 10px;
            color: #cbd5e1;
            white-space: pre-wrap;
            margin-left: 20px;
        }

        /* --- 3. BENTO GRID --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 90%;
            max-width: 1000px;
            margin-top: 30px;
            perspective: 1000px;
        }

        .card {
            background: var(--card-glass);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            cursor: default;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes popUp {
            to {
                opacity: 1;
                transform: translateY(0) perspective(1000px);
            }
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 24px;
            padding: 2px;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            opacity: 0.5;
            pointer-events: none;
        }

        .card:hover {
            box-shadow: 0 0 20px rgba(113, 75, 103, 0.4);
            border-color: rgba(113, 75, 103, 0.5);
        }

        .card-large {
            grid-column: span 2;
        }

        .card-tall {
            grid-row: span 2;
        }

        .card-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-content {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-desc {
            font-size: 0.95rem;
            color: #94a3b8;
            line-height: 1.6;
        }

        .card b {
            transition: color 0.25s ease, text-shadow 0.25s ease;
        }

        .card:hover b {
            color: #ffffff;
            text-shadow: 0 0 12px rgba(0, 232, 143, 0.8), 0 0 20px rgba(113, 75, 103, 0.6);
        }

        .card .term {
            color: #94a3b8;
            transition: color 0.25s ease, text-shadow 0.25s ease;
        }

        .card:hover .term {
            color: #ffffff;
            text-shadow: 0 0 12px rgba(0, 232, 143, 0.8), 0 0 20px rgba(113, 75, 103, 0.6);
        }

        .code-box {
            background: #1e1e1e !important;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            border-left: 3px solid #007acc !important;
            margin-top: 15px;
            opacity: 0.9;
            transform: translateZ(20px);
        }

        .kw {
            color: #569cd6;
            font-weight: bold;
        }

        .str {
            color: #ce9178;
        }

        .func {
            color: #dcdcaa;
        }

        .skill-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-right: 5px;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
            cursor: pointer;
        }

        @keyframes floatIcon {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        .card:hover img:not(.no-float),
        .card:hover i:not(.no-float) {
            animation: floatIcon 3s ease-in-out infinite;
        }

        /* --- TIMELINE CSS (EXPERIENCE) --- */
        .timeline-container {
            position: relative;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .timeline-container::after {
            content: '';
            position: absolute;
            width: 4px;
            background: linear-gradient(180deg, var(--odoo-green), var(--odoo-purple), transparent);
            top: 0;
            bottom: 0;
            left: 50%;
            margin-left: -2px;
            border-radius: 2px;
            box-shadow: 0 0 15px rgba(0, 232, 143, 0.4);
        }

        .timeline-box {
            padding: 10px 50px;
            position: relative;
            background: inherit;
            width: 50%;
            box-sizing: border-box;
        }

        .timeline-box::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            right: -10px;
            background: #0f172a;
            border: 3px solid var(--odoo-green);
            top: 25px;
            border-radius: 50%;
            z-index: 1;
            box-shadow: 0 0 10px var(--odoo-green);
            transition: all 0.3s ease;
        }

        .left {
            left: 0;
        }

        .right {
            left: 50%;
        }

        .right::after {
            left: -10px;
            border-color: var(--odoo-purple);
            box-shadow: 0 0 10px var(--odoo-purple);
        }

        .exp-card {
            padding: 30px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .exp-card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.3);
            z-index: 10;
        }

        .exp-card b {
            transition: color 0.25s ease, text-shadow 0.25s ease;
        }

        .exp-card:hover b {
            color: #ffffff;
            text-shadow: 0 0 12px rgba(0, 232, 143, 0.8), 0 0 20px rgba(113, 75, 103, 0.6);
        }

        .role-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }

        /* UPDATED: Flexbox for Big Logo */
        .company-name {
            font-size: 1.2rem;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .exp-date {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            font-size: 0.75rem;
            margin-top: 8px;
            color: var(--odoo-green);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        @media screen and (max-width: 600px) {
            .timeline-container::after {
                left: 20px;
            }

            .timeline-box {
                width: 100%;
                padding-left: 50px;
                padding-right: 10px;
            }

            .timeline-box::after {
                left: 10px;
            }

            .right {
                left: 0%;
            }
        }

        /* --- 4. DOCK --- */
        .dock-container {
            position: fixed;
            bottom: 30px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            padding: 12px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            gap: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            z-index: 100;
            animation: float 6s ease-in-out infinite;
        }

        .dock-icon {
            width: 50px;
            height: 50px;
            background: #1e293b;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #e2e8f0;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dock-icon.active {
            background: var(--odoo-purple);
            color: white;
            transform: translateY(-15px) scale(1.1);
            box-shadow: 0 10px 20px rgba(113, 75, 103, 0.4);
        }

        .dock-icon:hover {
            transform: translateY(-10px) scale(1.1);
            background: var(--odoo-green);
            color: black;
        }

        .dock-tooltip {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }

        .dock-icon:hover .dock-tooltip {
            opacity: 1;
            top: -50px;
        }

        /* --- PRELOADER --- */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0f172a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--odoo-green);
            font-family: 'Fira Code', monospace;
            transition: opacity 0.5s ease;
        }

        .loader-bar {
            width: 200px;
            height: 3px;
            background: #334155;
            margin-top: 10px;
            border-radius: 3px;
            overflow: hidden;
        }

        .loader-progress {
            width: 0%;
            height: 100%;
            background: var(--odoo-green);
            animation: load 1.5s ease forwards;
        }

        @keyframes load {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @media (max-width: 768px) {
            .bento-grid {
                grid-template-columns: 1fr;
            }

            .card-large,
            .card-tall {
                grid-column: span 1;
                grid-row: span 1;
            }

            .terminal-container {
                width: 95%;
                margin-top: 20px;
            }

            .card {
                transform: none !important;
            }
        }

        .skill-bar-fill {
            height: 100%;
            border-radius: 20px;
            animation: skillFill 1.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes skillFill {
            from { width: 0%; }
        }

        @keyframes statGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(0,232,143,0.15), 0 0 40px rgba(113,75,103,0.1); border-color: rgba(0,232,143,0.25); }
            50%       { box-shadow: 0 0 40px rgba(0,232,143,0.4),  0 0 80px rgba(113,75,103,0.3);  border-color: rgba(0,232,143,0.6);  }
        }

        .stat-card { animation: statGlow 3s ease-in-out infinite; }

        @keyframes statPop {
            0%   { transform: scale(0.3) translateY(12px); }
            70%  { transform: scale(1.18) translateY(-4px); }
            100% { transform: scale(1) translateY(0); }
        }

        .stat-num {
            display: inline-block;
            transform: scale(0);
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00E88F, #714B67);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
        }

        .stat-num.pop { animation: statPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        @media (max-width: 480px) {
            .card-content {
                font-size: 1.3rem;
            }

            .skill-tag {
                padding: 6px 14px;
                font-size: 0.75rem;
            }

            .card-large>div[style*="display: flex"] {
                flex-direction: column-reverse;
                align-items: center !important;
            }

            .card-large>div[style*="display: flex"]>div:first-child {
                text-align: center;
            }
        }

        .sticky-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            background: linear-gradient(135deg, var(--odoo-purple), #4c1d95);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .sticky-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 30px rgba(113, 75, 103, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }

        @media (max-width: 600px) {
            .sticky-btn {
                top: 20px;
                right: 20px;
                padding: 10px 18px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

    <script>
        // --- 1. PARTICLE BACKGROUND ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particlesArray;
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', (event) => { mouse.x = event.x; mouse.y = event.y; });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x; this.y = y;
                this.directionX = directionX; this.directionY = directionY;
                this.size = size; this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < mouse.radius + this.size) {
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) this.x += 2;
                    if (mouse.x > this.x && this.x > this.size * 10) this.x -= 2;
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) this.y += 2;
                    if (mouse.y > this.y && this.y > this.size * 10) this.y -= 2;
                }
                this.x += this.directionX; this.y += this.directionY;
                this.draw();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 10000;
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1; let directionY = (Math.random() * 2) - 1;
                let color = Math.random() > 0.5 ? '#714B67' : '#00E88F';

                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);

        function loadPage(pageName, element) {
            document.querySelectorAll('.dock-icon').forEach(icon => icon.classList.remove('active'));
            if (element) element.classList.add('active');
            else {
                const iconMap = { 'home': 0, 'projects': 1, 'experience': 2, 'resume': 3, 'contact': 4 };
                const icons = document.querySelectorAll('.dock-icon');
                if (icons[iconMap[pageName]]) icons[iconMap[pageName]].classList.add('active');
            }

            const grid = document.getElementById('main-content');
            grid.innerHTML = ''; grid.innerHTML = pages[pageName];

            // Only use grid layout for pages other than 'experience'
            if (pageName === 'experience') {
                grid.style.display = 'block'; // Timeline takes full width
            } else {
                grid.style.display = 'grid'; // Bento grid for others
            }

            const cards = grid.querySelectorAll('.card, .exp-card');
            cards.forEach((card, index) => {
                const delay = index * 0.1;
                if (card.classList.contains('stat-card')) {
                    card.style.animation = `popUp 0.5s ease forwards ${delay}s, statGlow 3s ease-in-out ${delay + 0.6}s infinite`;
                } else {
                    card.style.animation = `popUp 0.5s ease forwards ${delay}s`;
                }
            });
            initTilt();

            if (pageName === 'home') {
                const preloader = document.getElementById('preloader');
                const isFirstLoad = preloader && preloader.style.display !== 'none';
                const counterDelay = isFirstLoad ? 2300 : 400;
                setTimeout(() => {
                    document.querySelectorAll('.stat-num').forEach((el, i) => {
                        const target = parseInt(el.dataset.target);
                        const suffix = el.dataset.suffix || '';
                        setTimeout(() => {
                            el.classList.add('pop');
                            let current = 0;
                            const steps = 40;
                            const increment = target / steps;
                            const timer = setInterval(() => {
                                current += increment;
                                if (current >= target) { current = target; clearInterval(timer); }
                                el.textContent = Math.floor(current) + suffix;
                            }, 1000 / steps);
                        }, i * 150);
                    });
                }, counterDelay);
            }

            if (pageName === 'contact') {
                const quoteText = `"Great things in business are never done by one person."`;
                const quoteElement = document.getElementById('linkedin-quote-text');
                const cursorElement = document.getElementById('linkedin-cursor');
                if (quoteElement) {
                    quoteElement.innerHTML = '';
                    let i = 0;
                    const typeWriter = () => {
                        if (i < quoteText.length) {
                            quoteElement.innerHTML += quoteText.charAt(i);
                            i++;
                            setTimeout(typeWriter, 40);
                        } else if (cursorElement) {
                            cursorElement.style.display = 'none'; // hide cursor after typing
                        }
                    };
                    setTimeout(typeWriter, 600); // 600ms start delay to allow popup animation
                }
            }
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').style.opacity = '0';
                setTimeout(() => { document.getElementById('preloader').style.display = 'none'; }, 500);
            }, 1500);
        });

        loadPage('home', document.querySelector('.dock-icon.active'));
    </script>
